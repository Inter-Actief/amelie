{% extends "basis.html" %}
{% load i18n %}

{% block titel %}{% trans 'Change profile ' %}{% endblock titel %}

{% block content %}
    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
        <div class="ia">
            <h2>{% trans 'Change profile ' %}</h2>

            <div class="content">
                <form id="editPersonForm" method="post" enctype="multipart/form-data" class="big">
                    {% csrf_token %}
                    {{ form }}

                    <div class="buttons">
                        <a href="{{ person.get_absolute_url }}" class="looks-like-a-button">
                            {% trans 'Cancel' %}
                        </a>

                        <input type="submit" value="{% trans 'Save' %}">
                        <script type="text/javascript">
                            // Disable submit button after one click.
                            $('#editPersonForm').one('submit', function () {
                                $(this).find('input[type="submit"]').attr('disabled', 'disabled');
                            });
                        </script>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
