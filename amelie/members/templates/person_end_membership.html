{% load i18n %}
<div class="content">
    <h3 class="legend">{% trans 'Terminate memberships' %}</h3>

    <form id="endMembershipForm" action="{% url 'members:person_membership_end' obj.id %}" method="post" class="js-ajax-form" data-container="person_membership">
        {% for error in form.non_field_errors %}
            <div class="error">{{ error }}</div>
        {% endfor %}

        {% csrf_token %}
        {{ form.ended.errors }}
        {{ form.ended }}
        {{ form.payment_needed.errors }}
        <label for="{{ form.payment_needed.id_for_label }}">
            {{ form.payment_needed }}
            {{ form.payment_needed.label }}
        </label>

        <div class="buttons">
            <a href="{% url 'members:person_membership' obj.id %}" class="looks-like-a-button js-load-block" data-container="person_membership">
                {% trans 'Cancel' %}
            </a>

            <input type="submit" name="end" value="{% trans 'Save' %}" />
            <script type="text/javascript">
                // Disable submit button after one click.
                $('#endMembershipForm').one('submit', function () {
                    $(this).find('input[type="submit"]').attr('disabled', 'disabled');
                });
            </script>
        </div>
    </form>
</div>
